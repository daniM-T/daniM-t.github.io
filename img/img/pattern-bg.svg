<!-- img/pattern-bg.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
    <defs>
        <linearGradient id="g" x1="0" x2="1">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.03"/>
            <stop offset="1" stop-color="#000000" stop-opacity="0.03"/>
        </linearGradient>
        <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" />
        </filter>
    </defs>

    <!-- zachte achtergrondkleur -->
    <rect width="100%" height="100%" fill="#88958D"/>

    <!-- organische lijnen -->
    <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" fill="none" filter="url(#blur)">
        <path d="M0,200 C200,120 400,280 600,220 C800,160 1000,300 1200,240" />
        <path d="M0,320 C180,260 360,380 600,340 C840,300 1020,420 1200,380" />
        <path d="M0,440 C160,520 420,420 600,480 C780,540 1040,460 1200,520" />
    </g>

    <!-- subtiele overlay gradient -->
    <rect width="100%" height="100%" fill="url(#g)"/>
</svg>
